<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看圖估歌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#4a6fa5;--primary-dark:#395d89;--bg:linear-gradient(135deg,#f8f9fa,#e3f2fd)}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);margin:0}
header{background:linear-gradient(to right,#4a6fa5,#6e9cd2);color:#fff;text-align:center;padding:20px}
header h1{margin:0;font-size:1.6rem}
.container{max-width:480px;margin:20px auto;padding:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 28px rgba(0,0,0,.12);text-align:center}
.progress{font-size:.9rem;color:#666;margin-bottom:12px}
img{width:100%;border-radius:14px;margin-bottom:14px}
button{width:100%;padding:16px;margin:10px 0;font-size:1.05rem;border:none;border-radius:12px;background:var(--primary);color:#fff;cursor:pointer;transition:.2s}
button:hover{background:var(--primary-dark)}
.correct{color:#198754;font-weight:600}
.wrong{color:#dc3545;font-weight:600}
.lyric{margin-top:12px;background:#f5f7fb;padding:14px;border-radius:12px;font-style:italic;white-space:pre-line}
</style>
</head>
<body>
<header><h1>🎵 看圖估歌</h1></header>
<div class="container"><div id="game" class="card"></div></div>
