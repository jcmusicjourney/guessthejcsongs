<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看圖估歌</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#4a6fa5;
  --primary-dark:#395d89;
  --bg:linear-gradient(135deg,#f8f9fa,#e3f2fd);
}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  margin:0;
}
header{
  background:linear-gradient(to right,#4a6fa5,#6e9cd2);
  color:#fff;
  text-align:center;
  padding:20px;
}
.container{
  max-width:480px;
  margin:20px auto;
  padding:20px;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 28px rgba(0,0,0,.12);
  text-align:center;
}
.progress{
  font-size:.9rem;
  color:#666;
  margin-bottom:12px;
}
img{
  width:100%;
  border-radius:14px;
  margin-bottom:14px;
}
button{
  width:100%;
  padding:16px;
  margin:10px 0;
  font-size:1.05rem;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
}
button:hover{background:var(--primary-dark);}
.correct{color:#198754;font-weight:600;}
.wrong{color:#dc3545;font-weight:600;}
.lyric{
  margin-top:12px;
  background:#f5f7fb;
  padding:14px;
  border-radius:12px;
  font-style:italic;
  white-space:pre-line;
}
</style>
</head>

<body>

<header>
  <h1>🎵 看圖估歌</h1>
</header>

<div class="container">
  <div id="game" class="card"></div>
</div>

<script>
/* ===== 題庫（完整版） ===== */

const QUESTIONS = {
easy:[
{image:"images/交叉算了.jpg",options:["馬路英雄","交叉算了","日出時讓戀愛終結"],answer:1,lyric:"踏上的士\n垂頭玩弄大鼻子"},
{image:"images/她來聽我的演唱會.jpg",options:["在你身邊","留給自己一個晚上","她來聽我的演唱會"],answer:2,lyric:"她來聽我的演唱會\n身邊的男人早已漸漸入睡\n她靜靜聽著我們的演唱會"},
{image:"images/有個人.jpg",options:["愛是永恆","有個人","真情流露"],answer:1,lyric:"同行共領會人世道理\n有老伴仍是你"},
{image:"images/有病呻吟.jpg",options:["有病呻吟","樓上來的聲音","等你等到我心痛"],answer:0,lyric:"如果失戀註定逃不過"},
{image:"images/吻別.png",options:["心碎了無痕","明日約定","吻別"],answer:2,lyric:"我和你吻別 在無人的街"},
{image:"images/壯志驕陽.png",options:["壯志驕陽","太陽星辰","每天愛你多一些"],answer:0,lyric:"飛機將降落了"},

{image:"images/李香蘭.jpg",options:["怎麼捨得你","李香蘭","忘情冷雨夜"],answer:1,lyric:"夜雨凍 雨點透射到照片中"},
{image:"images/沒有童話時.jpg",options:["Life Is Like A Dream","讓奇妙飛翔","沒有童話時"],answer:2,lyric:"從前信 天空月亮"},
{image:"images/馬路英雄.png",options:["這一次意外","燥狂","馬路英雄"],answer:2,lyric:"世界似後退"},
{image:"images/望月.png",options:["望月","餓狼傳說","愛狼說"],answer:0,lyric:"狼在叫 雪正飄"},
{image:"images/樓上來的聲音.jpg",options:["有病呻吟","寂寞的男人","樓上來的聲音"],answer:2,lyric:"靜處在家中竟有壓力"},
{image:"images/頭髮亂了.jpg",options:["和好不如初","頭髮亂了","生命的插曲"],answer:1,lyric:"你秀髮亂了"},
{image:"images/藍雨.png",options:["藍雨","別戀","春風秋雨"],answer:0,lyric:"灰灰的天 空空的街"},
{image:"images/Double Trouble.jpg",options:["這一次意外","Double Trouble","勇敢的故事"],answer:1,lyric:"那個殺手正回來"}
],
hard:[
{image:"images/分手總要在雨天.jpeg",options:["分手總要在雨天","還是覺得你最好","我哭了"],answer:0,lyric:"連綿夜雨 也似這天"},
{image:"images/太陽星辰.jpg",options:["地球人","愛是永恆","太陽星辰"],answer:2,lyric:"難得當中的妳關心我"},
{image:"images/月半彎.png",options:["月半彎","夕陽醉了","暗戀你"],answer:0,lyric:"月半彎 倚於深宵"},
{image:"images/地球人.png",options:["留住這時光","Life Is Like A Dream","地球人"],answer:2,lyric:"我願穿梭千里路軌"},
{image:"images/好久不見.jpg",options:["好久不見","明日約定","心如刀割"],answer:0,lyric:"只能這樣了 不打擾"},
{image:"images/我應該.jpg",options:["我應該","和好不如初","我哭了"],answer:0,lyric:"常痛哭躲在門外"},
{image:"images/和好不如初.jpg",options:["屈到病","和好不如初","玩不起"],answer:1,lyric:"即使修理以後瘡疤太多"},
{image:"images/野貓之戀.jpeg",options:["屈到病","這麼近（那麼遠）","野貓之戀"],answer:2,lyric:"美麗偏偏不羈"},
{image:"images/想劈酒.png",options:["想劈酒","釋放自己","似醉還未醉"],answer:0,lyric:"今朝有酒 今朝飲夠"},
{image:"images/離人.png",options:["離人","枕邊月亮","流星下的願"],answer:0,lyric:"一次告別 天上又熄滅一顆星"}
]
};

/* ===== 遊戲流程 ===== */

const params = new URLSearchParams(location.search);
const difficulty = params.get("difficulty") || "easy";
const questions = QUESTIONS[difficulty];

let index = 0;
let score = 0;
const startTime = Date.now();
const game = document.getElementById("game");

function render(){
  const q = questions[index];
  game.innerHTML = `
    <div class="progress">題目 ${index+1} / ${questions.length}</div>
    <img src<button onclick="answer(${i})">${o}</button>`).join("")}
  `;
}

function answer(i){
  const q = questions[index];
  if(i===q.answer) score++;
  game.innerHTML = `
    <div class="${i===q.answer?'correct':'wrong'}">
      ${i===q.answer?'✅ 正確':'❌ 錯誤'}
    </div>
    <p>正確答案：${q.options[q.answer]}</p>
    <div class="lyric">${q.lyric}</div>
    <button onclick="next()">下一題</button>
  `;
}

function next(){
  index++;
  if(index<questions.length){
    render();
  }else{
    const t=Math.floor((Date.now()-startTime)/1000);
    game.innerHTML=`
      <h2>🎉 完成</h2>
      <p>得分：${score}/${questions.length}</p>
      <p>時間：${t} 秒</p>
      <button onclick="location.reload()">再玩一次</button>
    `;
  }
}

render();
</script>

</body>
</html>
