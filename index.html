<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看圖估歌</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans TC',sans-serif;
  background:linear-gradient(135deg,#f8f9fa,#e3f2fd);
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
header{
  background:linear-gradient(to right,#4a6fa5,#6e9cd2);
  color:#fff;
  text-align:center;
  padding:32px 20px;
}
header h1{
  margin:0 0 10px;
  font-size:2rem;
}
header p{
  margin:0;
  opacity:.95;
}
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  background:#fff;
  padding:28px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  max-width:420px;
  width:100%;
  text-align:center;
}
.mode{
  margin:18px 0;
  padding:18px;
  border-radius:14px;
  border:2px solid #e6ecf5;
  cursor:pointer;
  font-size:1.1rem;
  transition:.2s;
}
.mode:hover{
  border-color:#4a6fa5;
  transform:translateY(-2px);
  background:#f5f8ff;
}
footer{
  text-align:center;
  font-size:.8rem;
  color:#666;
  padding:14px;
}
</style>
</head>

<body>

<header>
  <h1>🎵 看圖估歌</h1>
  <p>你能猜到這是那首張學友唱的歌嗎？</p>
</header>

<div class="main">
  <div class="card">
    <div class="mode" onclick="start('easy')">🎈 簡單模式</div>
    <div class="mode" onclick="start('hard')">🔥 困難模式</div>
  </div>
</div>

<footer>
  Images are generated by Gemini
</footer>

<script>
function start(level){
  location.href = 'game.html?difficulty=' + level;
}
</script>

</body>
</html>
